{% extends 'base.html' %}

{% block title %}Login - SkillBridge{% endblock %}

{% block content %}
<div class="auth-container" style="position: relative;">

    <div class="auth-card" style="position: relative; z-index: 10;">
        <!-- Logo -->
        <div class="text-center mb-4">
            <div class="logo-icon gradient-primary rounded-3 p-3 d-inline-flex mb-3">
                <i class="bi bi-lightning-charge-fill text-white fs-2"></i>
            </div>
            <h2 class="fw-bold">Welcome Back!</h2>
            <p class="text-muted">Log in to your SkillBridge account</p>
        </div>
        
        <!-- Login Form -->
        <form method="POST" action="{{ url_for('auth.login') }}" class="needs-validation" novalidate>
            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control form-control-lg" id="email" name="email"
                    placeholder="Enter your registered email" required>
                <div class="invalid-feedback">
                    Please enter a valid email address.
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="position-relative">
                    <input type="password" class="form-control form-control-lg pe-5" id="password" name="password"
                        placeholder="Enter your password" required>
                    <button type="button" tabindex="-1" onclick="togglePasswordVisibility('password', this)"
                        style="position:absolute; right:35px; top:50%; transform:translateY(-50%); background:none; border:none; padding:0; cursor:pointer; z-index:10; color:#6c757d;">
                        <i class="bi bi-eye-slash fs-5"></i>
                    </button>
                </div>
                <div class="invalid-feedback">
                    Please enter your password.
                </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember">
                    <label class="form-check-label" for="remember">
                        Remember me
                    </label>
                </div>

            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-gradient-primary btn-lg w-100 mb-3">
                <i class="bi bi-box-arrow-in-right me-2"></i>
                Log In
            </button>

            <!-- Divider -->
            <div class="text-center text-muted my-3">
                <small>or continue with</small>
            </div>

            <!-- Social Login Buttons -->
            <div class="d-flex justify-content-center">
                <a href="{{ url_for('auth.google_login') }}"
                    class="btn btn-outline-dark d-flex align-items-center px-4 py-2" style="border-radius: 8px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" class="me-2">
                        <path fill="#4285F4"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#34A853"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#FBBC05"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#EA4335"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span class="fw-medium">Continue with Google</span>
                </a>
            </div>

            <!-- Register Link -->
            <div class="text-center mt-4">
                <p class="text-muted mb-0">
                    Don't have an account?
                    <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold text-decoration-none">Sign
                        Up</a>
                </p>
            </div>
        </form>
    </div>

</div>

<style>
    .characters-left {
        position: fixed;
        left: 5%;
        top: 50%;
        transform: translateY(-50%);
        z-index: 1;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: flex-start;
    }

    .characters-right {
        position: fixed;
        right: 5%;
        top: 50%;
        transform: translateY(-50%);
        z-index: 1;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: flex-start;
    }

    .cartoon-character {
        position: relative;
        animation: float 3s ease-in-out infinite;
    }

    .char-1 {
        animation-delay: 0s;
        z-index: 4;
        margin-left: 0;
    }

    .char-2 {
        animation-delay: 0.5s;
        z-index: 2;
        margin-left: 40px;
        margin-top: -20px;
    }

    .char-3 {
        animation-delay: 1s;
        z-index: 3;
        margin-left: 20px;
        margin-top: -10px;
    }

    .char-4 {
        animation-delay: 1.3s;
        z-index: 1;
        margin-left: 60px;
        margin-top: -0px;
    }

    /* for right */
    .char-11 {
        animation-delay: 0s;
        z-index: 4;
        margin-left: 0;
    }

    .char-21 {
        animation-delay: 0.5s;
        z-index: 2;
        margin-left: 40px;
        margin-top: -20px;
    }

    .char-31 {
        animation-delay: 1s;
        z-index: 3;
        margin-left: 20px;
        margin-top: -10px;
    }

    .char-41 {
        animation-delay: 1.3s;
        z-index: 1;
        margin-left: 60px;
        margin-top: -0px;
    }

    @keyframes float {

        0%,
        100% {
            transform: translateY(0px);
        }

        50% {
            transform: translateY(-10px);
        }
    }

    .char-body {
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s ease;
    }

    /* T-shaped Character */
    .char-t-shape {
        clip-path: polygon(20% 0%, 80% 0%, 100% 30%, 100% 100%, 0% 100%, 0% 30%);
    }

    .eyes-group-top {
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding-top: 15px;
        gap: 20px;
    }

    .char-mouth-teeth {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 3px;
        width: 120px;
        justify-content: center;
    }

    .tooth {
        width: 15px;
        height: 20px;
        background: white;
        border-radius: 2px;
    }

    /* Pink Blob Character */
    .char-blob {
        position: relative;
    }

    .eye-single {
        width: 35px;
        height: 35px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .char-mouth-small {
        position: absolute;
    }

    .tooth-tiny {
        width: 4px;
        height: 6px;
        background: white;
        border-radius: 1px;
        display: inline-block;
        margin: 0 1px;
    }

    /* Cloud Character */
    .char-cloud {
        position: relative;
    }

    .eyes-group {
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding-top: 25px;
        gap: 15px;
    }

    .char-mouth-oval {
        position: absolute;
    }

    .char-legs {
        position: absolute;
        bottom: -25px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
    }

    .leg {
        width: 8px;
        height: 20px;
        background: #7dd3fc;
        border-radius: 2px;
    }

    /* Circle Character */
    .char-circle {
        position: relative;
    }

    .char-mouth-irregular {
        position: absolute;
    }

    /* Eye Styles */
    .eye {
        width: 20px;
        height: 20px;
        background: white;
        border-radius: 50%;
        position: relative;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .pupil {
        width: 10px;
        height: 10px;
        background: #000;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        transition: all 0.15s ease-out;
    }

    .eye-single .pupil {
        width: 15px;
        height: 15px;
    }

    @media (max-width: 1400px) {
        .characters-left {
            left: 2%;
        }

        .char-t-shape {
            width: 140px !important;
            height: 110px !important;
        }

        .char-blob {
            width: 120px !important;
            height: 100px !important;
        }

        .char-cloud {
            width: 100px !important;
            height: 80px !important;
        }

        .char-circle {
            width: 65px !important;
            height: 65px !important;
        }
    }

    @media (max-width: 1200px) {
        .characters-left {
            display: none;
        }
    }
</style>

<script>
    function togglePasswordVisibility(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        } else {
            input.type = 'password';
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        const eyes = document.querySelectorAll('.eye');

        document.addEventListener('mousemove', function (e) {
            eyes.forEach((eye) => {
                const eyeRect = eye.getBoundingClientRect();
                const eyeCenterX = eyeRect.left + eyeRect.width / 2;
                const eyeCenterY = eyeRect.top + eyeRect.height / 2;

                const mouseX = e.clientX;
                const mouseY = e.clientY;

                const deltaX = mouseX - eyeCenterX;
                const deltaY = mouseY - eyeCenterY;

                // Calculate distance (limit movement to eye boundary)
                const maxDistance = 4; // Maximum pixels the pupil can move
                const distance = Math.min(Math.sqrt(deltaX * deltaX + deltaY * deltaY), maxDistance);

                // Calculate angle
                const angle = Math.atan2(deltaY, deltaX);

                // Calculate new position
                const moveX = Math.cos(angle) * distance;
                const moveY = Math.sin(angle) * distance;

                // Apply transformation to pupil
                const pupil = eye.querySelector('.pupil');
                if (pupil) {
                    pupil.style.transform = `translate(calc(-50% + ${moveX}px), calc(-50% + ${moveY}px))`;
                }
            });
        });
    });
</script>
{% endblock %}
